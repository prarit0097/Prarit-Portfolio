<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>%VITE_SITE_TITLE%</title>
    <meta name="title" content="%VITE_SITE_TITLE%" />
    <meta name="description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="author" content="Prarit Sidana" />
    <meta name="keywords" content="Prarit Sidana, AI Engineer, Full-Stack Developer, LLM, AI Agents, RAG, Python, Django, React, TypeScript, Machine Learning, Delhi, Portfolio, Remote" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="theme-color" content="#10b981" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Prarit Sidana" />
    
    <!-- Geo Tags for Local SEO -->
    <meta name="geo.region" content="IN-DL" />
    <meta name="geo.placename" content="Delhi" />
    <meta name="geo.position" content="28.6139;77.2090" />
    <meta name="ICBM" content="28.6139, 77.2090" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%" />
    <meta property="og:title" content="%VITE_SITE_TITLE%" />
    <meta property="og:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_OG_IMAGE_URL%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Prarit Sidana - AI Engineer & Full-Stack Developer" />
    <meta property="og:site_name" content="Prarit Sidana" />
    <meta property="og:locale" content="en_IN" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="%VITE_SITE_URL%" />
    <meta name="twitter:title" content="%VITE_SITE_TITLE%" />
    <meta name="twitter:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_OG_IMAGE_URL%" />
    <meta name="twitter:creator" content="@prarit" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="%VITE_SITE_URL%" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/favicon.png?v=ps-1" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192x192.png?v=ps-1" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json?v=ps-1" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" />
    <link rel="dns-prefetch" href="%VITE_SUPABASE_URL%" />
    
    <!-- JSON-LD WebSite Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Prarit Sidana Portfolio",
      "alternateName": "Prarit Sidana",
      "url": "%VITE_SITE_URL%",
      "description": "%VITE_SITE_DESCRIPTION%",
      "publisher": {
        "@type": "Person",
        "name": "Prarit Sidana"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "%VITE_SITE_URL%/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>

    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-primary focus:text-primary-foreground focus:rounded-md">
      Skip to main content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
